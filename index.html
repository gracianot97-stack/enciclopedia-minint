<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enciclopédia de Preparação MININT</title>
    <!-- Configurações PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Registro do Service Worker para suporte Offline e Instalação -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('Service Worker registrado com sucesso:', reg.scope);
              
              // Se houver uma atualização de Service Worker, recarrega a página automaticamente para o usuário
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('Nova versão da Enciclopédia detectada. Recarregando a aplicação...');
                        window.location.reload();
                      }
                    }
                  };
                }
              };
            })
            .catch((err) => console.error('Erro ao registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
